<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tidak ada koneksi · Simon</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --card: #ffffff;
        --fg: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --primary: #059669;
        --primary-fg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1120;
          --card: #111827;
          --fg: #e2e8f0;
          --muted: #94a3b8;
          --border: #1f2937;
          --primary: #10b981;
          --primary-fg: #052e22;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        width: 100%;
        max-width: 26rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.25rem;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: color-mix(in srgb, var(--primary) 14%, transparent);
        color: var(--primary);
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin: 0 0 1.5rem; }
      button {
        appearance: none;
        border: none;
        cursor: pointer;
        background: var(--primary);
        color: var(--primary-fg);
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.7rem 1.5rem;
        border-radius: 0.6rem;
        transition: opacity 0.15s ease;
      }
      button:hover { opacity: 0.9; }
      .status { margin-top: 1rem; font-size: 0.75rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>Anda sedang offline</h1>
      <p>
        Simon tidak dapat terhubung ke internet saat ini. Periksa koneksi Anda,
        lalu coba lagi. Halaman akan otomatis dimuat ulang ketika koneksi kembali.
      </p>
      <button type="button" onclick="location.reload()">Coba Lagi</button>
      <div class="status" id="status"></div>
    </div>
    <script>
      // Auto-reload saat koneksi kembali
      window.addEventListener("online", function () {
        document.getElementById("status").textContent = "Koneksi kembali, memuat ulang…";
        location.reload();
      });
    </script>
  </body>
</html>
